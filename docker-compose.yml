# ─────────────────────────────────────────────────────────────────────────────
#  HSI Employee Engagement Platform — Production Docker Compose
#  PRD Reference: HSI-PRD-EEP-2026-v1.0 §9.1
#  Stack: PostgreSQL 16 → pgBouncer 1.22 → FastAPI backend → React frontend → Nginx
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hsi_db
    environment:
      POSTGRES_DB:       ${DB_NAME:-hsi_portal}
      POSTGRES_USER:     ${DB_USER:-hsi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hsi_password123}
      # Sprint F: WAL archiving for point-in-time recovery
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # DB initialisation: creates 4 app roles + app schema on first start
      # (scripts/init.sql is idempotent — safe to leave in place)
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/10_init.sql:ro
      # Sprint F: WAL archive destination (daily full + hourly WAL)
      - pg_wal_archive:/mnt/wal_archive
    command: >
      postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /mnt/wal_archive/%f && cp %p /mnt/wal_archive/%f'
        -c archive_timeout=3600
        -c max_wal_senders=3
        -c wal_keep_size=128
    networks:
      - hsi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hsi_user} -d ${DB_NAME:-hsi_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── pgBouncer — Connection Pooler (PRD §2.3 + §9.1) ──────────────────────
  #  Sits between the backend API and PostgreSQL.
  #  Transaction-mode pooling: each SQL statement can reuse a pooled connection,
  #  supporting 500 concurrent client connections with only 20 server connections.
  #  NOTE: bitnami/pgbouncer was fully removed from Docker Hub in 2025.
  #        edoburu/pgbouncer is the recommended lightweight replacement (Alpine,
  #        <10 MB, actively maintained, 10 M+ pulls).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: hsi_pgbouncer
    environment:
      # PostgreSQL backend connection (edoburu var names)
      DB_HOST:              db
      DB_PORT:              "5432"
      DB_USER:              ${DB_USER:-hsi_user}
      DB_PASSWORD:          ${DB_PASSWORD:-hsi_password123}
      DB_NAME:              ${DB_NAME:-hsi_portal}
      # Pool configuration
      POOL_MODE:            ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN:      "${PGBOUNCER_MAX_CLIENT_CONN:-500}"
      DEFAULT_POOL_SIZE:    "${PGBOUNCER_DEFAULT_POOL_SIZE:-20}"
      MIN_POOL_SIZE:        "${PGBOUNCER_MIN_POOL_SIZE:-5}"
      RESERVE_POOL_SIZE:    "${PGBOUNCER_RESERVE_POOL_SIZE:-10}"
      RESERVE_POOL_TIMEOUT: "${PGBOUNCER_RESERVE_POOL_TIMEOUT:-3}"
      # Auth — must match POSTGRES_INITDB_ARGS (--auth-host=scram-sha-256)
      AUTH_TYPE:            scram-sha-256
      # Ignore startup parameters sent by psycopg2 / SQLAlchemy
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      # Admin / stats users
      ADMIN_USERS:          ${DB_USER:-hsi_user}
      STATS_USERS:          ${DB_USER:-hsi_user}
      # Listen on 6432 so it doesn't clash with the db container on 5432
      LISTEN_PORT:          "6432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hsi_network
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "${DB_USER:-hsi_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Redis 7 (rate limiting, session metadata) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hsi_redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - hsi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO — S3-compatible object storage (Sprint G) ───────────────────────
  # Stores best-practice attachments, user avatars, EDM images.
  # Console: http://localhost:9001  (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
  # NOTE: Official minio/minio CE images stopped after Oct 2025.
  #       The last stable published tag is used here; it will continue to work
  #       indefinitely since the image is already on Docker Hub.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: hsi_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - hsi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  #  DATABASE_URL now routes through pgBouncer (port 6432) instead of
  #  connecting directly to PostgreSQL (port 5432).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hsi_backend
    environment:
      # Runtime API traffic → pgBouncer → PostgreSQL (transaction pool)
      DATABASE_URL:       "postgresql://${DB_USER:-hsi_user}:${DB_PASSWORD:-hsi_password123}@pgbouncer:6432/${DB_NAME:-hsi_portal}"
      # Admin operations (DELETE, schema checks) — also via pgBouncer.
      # In Sprint F replace hsi_user with the dedicated hsi_admin role.
      DATABASE_ADMIN_URL: "postgresql://${DB_USER:-hsi_user}:${DB_PASSWORD:-hsi_password123}@pgbouncer:6432/${DB_NAME:-hsi_portal}"
      JWT_SECRET:         ${JWT_SECRET:-change-me-to-a-random-32-char-string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-to-a-different-secret}
      ADMIN_EMAIL:        ${ADMIN_EMAIL:-admin@hitachi-systems.com}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD:-Admin@123}
      ALLOWED_DOMAIN:     ${ALLOWED_DOMAIN:-hitachi-systems.com}
      BCRYPT_ROUNDS:      ${BCRYPT_ROUNDS:-12}
      ACCESS_TTL_MIN:     ${ACCESS_TTL_MIN:-15}
      REFRESH_TTL_DAY:    ${REFRESH_TTL_DAY:-30}
      LOCKOUT_FAILS:      ${LOCKOUT_FAILS:-5}
      LOCKOUT_MIN:        ${LOCKOUT_MIN:-15}
      MFA_ENABLED:        ${MFA_ENABLED:-true}
      OTP_LENGTH:         ${OTP_LENGTH:-6}
      OTP_TTL_MIN:        ${OTP_TTL_MIN:-10}
      OTP_MAX_ATTEMPTS:   ${OTP_MAX_ATTEMPTS:-3}
      DEMO_OTP:           ${DEMO_OTP:-000000}
      REDIS_URL:          ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS:       ${CORS_ORIGINS:-*}
      AWS_REGION:         ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID:  ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      SES_SENDER_EMAIL:   ${SES_SENDER_EMAIL:-noreply@hitachi-systems.com}
      SES_SENDER_NAME:    ${SES_SENDER_NAME:-HSI Enterprise Platform}
      UVICORN_WORKERS:    ${UVICORN_WORKERS:-2}
      UVICORN_LOG_LEVEL:  ${UVICORN_LOG_LEVEL:-info}
      # Sprint F: Sentry monitoring (leave blank to disable)
      SENTRY_DSN:         ${SENTRY_DSN:-}
      SENTRY_TRACES_RATE: ${SENTRY_TRACES_RATE:-0.1}
      ENVIRONMENT:        ${ENVIRONMENT:-production}
      APP_VERSION:        ${APP_VERSION:-sprint-g}
      SKIP_SEED_ON_IMPORT: "1"   # seeding happens in entrypoint.sh → seed.py
      # Sprint G — Object storage
      MINIO_ENDPOINT:     ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY:   ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:   ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET:       ${MINIO_BUCKET:-hsi-eep}
      MINIO_SECURE:       ${MINIO_SECURE:-false}
      MINIO_PUBLIC_URL:   ${MINIO_PUBLIC_URL:-}
      MAX_UPLOAD_BYTES:   ${MAX_UPLOAD_BYTES:-10485760}
      WS_BROADCAST_CHANNEL: ${WS_BROADCAST_CHANNEL:-hsi:broadcast}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hsi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://your-domain.com}
    container_name: hsi_frontend
    networks:
      - hsi_network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hsi_nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hsi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Sprint F: WAL Backup Service ───────────────────────────────────────────
  # Runs daily full base-backup + continuous WAL archiving.
  # Backups land in the pg_wal_archive volume (mount externally for off-site copy).
  backup:
    image: postgres:16-alpine
    container_name: hsi_backup
    environment:
      PGHOST:     db
      PGPORT:     "5432"
      PGUSER:     ${DB_USER:-hsi_user}
      PGPASSWORD: ${DB_PASSWORD:-hsi_password123}
      PGDATABASE: ${DB_NAME:-hsi_portal}
    volumes:
      - pg_wal_archive:/backup
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hsi_network
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && crond -f -l 8 & /backup.sh && wait"]
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pg_wal_archive:
    driver: local
  minio_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  hsi_network:
    driver: bridge
