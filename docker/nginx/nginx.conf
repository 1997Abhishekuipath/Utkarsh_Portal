# ─────────────────────────────────────────────────────────────────────────────
#  HSI Enterprise Portal — Top-Level Nginx Reverse Proxy (Production)
#  Handles: TLS termination, HTTP→HTTPS redirect, routing /api to backend and
#           all other traffic to the frontend SPA container.
#  Mounted into the `nginx` service at: /etc/nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;
    client_max_body_size 50M;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Upstream services (docker-compose service names) ──────────────────────
    upstream hsi_backend_upstream {
        server backend:8001;
        keepalive 32;
    }

    upstream hsi_frontend_upstream {
        server frontend:80;
        keepalive 32;
    }

    # ── Rate limiting (defense-in-depth for /api) ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTP → HTTPS redirect (port 80)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME / Let's Encrypt HTTP-01 challenge (optional — uncomment if using certbot)
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTPS main server (port 443)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── SSL certificate placeholders ──────────────────────────────────────
        # Drop your real certificate files in ./docker/nginx/ssl/ on the host.
        # Expected filenames (change here if yours differ):
        #   fullchain.pem  — full certificate chain
        #   privkey.pem    — private key
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── Modern TLS config (Mozilla intermediate) ──────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"        always;
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "1; mode=block"      always;

        # ── Backend API (/api/*) ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://hsi_backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Long-lived requests (exports, imports)
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 10s;

            # Don't cache API responses
            proxy_buffering off;
        }

        # ── Frontend SPA (everything else) ────────────────────────────────────
        location / {
            proxy_pass         http://hsi_frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ── Block hidden files / common exploit paths ─────────────────────────
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        access_log /var/log/nginx/hsi_access.log main;
        error_log  /var/log/nginx/hsi_error.log warn;
    }
}
