# ─────────────────────────────────────────────────────────────────────────────
#  HSI Employee Engagement Platform — Top-Level Nginx Reverse Proxy (Production)
#  Sprint F: TLS 1.3 only, HSTS preload, full security header set, CSP,
#            Permissions-Policy, X-Request-ID forwarding, stricter rate limits.
#  Handles: TLS termination, HTTP→HTTPS redirect, routing /api to backend and
#           all other traffic to the frontend SPA container.
#  Mounted into the `nginx` service at: /etc/nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (includes X-Request-ID for distributed tracing) ──────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid="$http_x_request_id" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;                # hide nginx version (hardening)
    client_max_body_size 50M;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Upstream services (docker-compose service names) ──────────────────────
    upstream hsi_backend_upstream {
        server backend:8001;
        keepalive 32;
    }

    upstream hsi_frontend_upstream {
        server frontend:80;
        keepalive 32;
    }

    # WebSocket connection upgrade map — required by /api/ws location below.
    map $http_upgrade $hsi_connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Rate limiting (Sprint F: tighter auth-endpoint limits) ───────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;   # login + register
    limit_req_zone $binary_remote_addr zone=otp_limit:10m     rate=3r/m;   # OTP verify

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTP → HTTPS redirect (port 80)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME / Let's Encrypt HTTP-01 challenge (optional — uncomment if using certbot)
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTPS main server (port 443)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── SSL certificate placeholders ──────────────────────────────────────
        # Drop your real certificate files in ./docker/nginx/ssl/ on the host.
        # Expected filenames (change here if yours differ):
        #   fullchain.pem  — full certificate chain
        #   privkey.pem    — private key
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── Sprint F: TLS 1.3 only (drop TLS 1.2) ────────────────────────────
        # TLS 1.3 eliminates all legacy cipher-suite vulnerabilities (BEAST,
        # POODLE, LUCKY13) and is required by NCSC/SEBI cyber guidelines.
        # If you must support IE11 / Win7 clients, revert to TLSv1.2 TLSv1.3.
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;   # TLS 1.3 manages ciphers itself
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;         # disable for PFS (Forward Secrecy)

        # OCSP stapling (uncomment once a real cert is installed)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # resolver 8.8.8.8 1.1.1.1 valid=300s;

        # ── Sprint F: Hardened Security Headers ──────────────────────────────
        # HSTS preload (2 years) — enables browser preload list submission
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Strict referrer control
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content-Security-Policy (single-line — nginx add_header takes exactly name + value + always)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Permissions-Policy (single-line)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

        # Cross-Origin policies
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # Forward / echo the X-Request-ID for distributed tracing
        add_header X-Request-ID $http_x_request_id always;

        # ── WebSocket — must be BEFORE the catch-all /api/ block ──────────────
        # Sprint C live-sync endpoint at /api/ws. Requires HTTP 1.1 + Upgrade
        # headers + a long read timeout (no rate-limiting: it's one persistent
        # connection per logged-in tab, not per request).
        location = /api/ws {
            proxy_pass         http://hsi_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $hsi_connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
            proxy_buffering off;
        }

        # ── Auth endpoints — strict rate limit ────────────────────────────────
        location ~ ^/api/auth/(login|register|check-email) {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         http://hsi_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $http_x_request_id;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        location = /api/auth/verify-otp {
            limit_req zone=otp_limit burst=5 nodelay;

            proxy_pass         http://hsi_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $http_x_request_id;
            proxy_set_header   Connection        "";
        }

        # ── Backend API (/api/*) ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://hsi_backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $http_x_request_id;
            proxy_set_header   Connection        "";

            # Long-lived requests (exports, imports)
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 10s;

            # Don't cache API responses
            proxy_buffering off;
        }

        # ── Frontend SPA (everything else) ────────────────────────────────────
        location / {
            proxy_pass         http://hsi_frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ── Block hidden files / common exploit paths ─────────────────────────
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        access_log /var/log/nginx/hsi_access.log main;
        error_log  /var/log/nginx/hsi_error.log warn;
    }
}
