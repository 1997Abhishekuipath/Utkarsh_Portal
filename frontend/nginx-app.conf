# Nginx config for the frontend container (serves React SPA static files)
# This runs INSIDE the frontend Docker container on port 80

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache immutable static assets (hashed filenames from CRA build)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache media files
    location ~* \.(ico|jpg|jpeg|png|gif|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # Disable access logs for health-check noise
    access_log off;
    error_log  /var/log/nginx/frontend_error.log warn;
}
